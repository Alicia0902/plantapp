            <div className="s-icon" style={{background:'#F5EAE8'}}>🗑</div>
            <div style={{flex:1}}><div style={{fontSize:14,color:'var(--ink)'}}>Alle planten verwijderen</div><div style={{fontSize:11,color:'var(--ink3)',marginTop:1}}>Niet te herstellen</div></div>
            <div style={{fontSize:13,color:'var(--red)'}}>›</div>
          </div>
        </div>
        <div style={{height:12}}/>
        <button onClick={onLogout} style={{width:'100%',padding:14,background:'var(--red-soft)',border:'none',borderRadius:'var(--r)',color:'var(--red)',fontSize:14,fontWeight:600,fontFamily:'inherit',cursor:'pointer'}}>Uitloggen</button>
      </div>
      {showDeleteAll&&(
        <div className="modal-overlay">
          <div className="modal">
            <div className="serif" style={{fontSize:22,color:'var(--ink)',marginBottom:8}}>Alle planten verwijderen?</div>
            <div style={{fontSize:13,color:'var(--ink3)',marginBottom:24,lineHeight:1.5}}>Je verwijdert {plants.length} plant{plants.length!==1?'en':''}. Niet te herstellen.</div>
            <button className="modal-btn danger" onClick={()=>{onDeleteAll();setShowDeleteAll(false);}}>Ja, alles verwijderen</button>
            <button className="modal-btn cancel" onClick={()=>setShowDeleteAll(false)}>Annuleren</button>
          </div>
        </div>
      )}
      {showSummary&&(
        <div className="modal-overlay" onClick={()=>setShowSummary(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="serif" style={{fontSize:22,color:'var(--ink)',marginBottom:8}}>🌿 Dagelijkse samenvatting</div>
            <div style={{fontSize:13,color:'var(--ink2)',marginBottom:16,lineHeight:1.6}}>Je hebt <strong>{plants.length}</strong> plant{plants.length!==1?'en':''} in je tuin.</div>
            {urgent>0&&<div style={{background:'var(--red-soft)',borderRadius:'var(--r-sm)',padding:'10px 14px',marginBottom:8,fontSize:13,color:'var(--red)',fontWeight:500}}>⚠️ {urgent} plant{urgent!==1?'en':''} hebben dringend water nodig</div>}
            {soon>0&&<div style={{background:'var(--yellow-soft)',borderRadius:'var(--r-sm)',padding:'10px 14px',marginBottom:8,fontSize:13,color:'var(--yellow)',fontWeight:500}}>⏰ {soon} plant{soon!==1?'en':''} binnenkort water nodig</div>}
            {urgent===0&&soon===0&&<div style={{background:'var(--green-light)',borderRadius:'var(--r-sm)',padding:'10px 14px',marginBottom:8,fontSize:13,color:'var(--green)',fontWeight:500}}>✅ Alle planten zijn in goede staat!</div>}
            {plants.map(p=>(
              <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid var(--line)'}}>
                <span style={{fontSize:20}}>{p.emoji}</span>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500,color:'var(--ink)'}}>{p.name}</div><div style={{fontSize:11,color:'var(--ink3)'}}>{formatNext(p.next_water)}</div></div>
                <div className={`status-dot ${getStatus(p)}`}/>
              </div>
            ))}
            <button className="modal-btn cancel" style={{marginTop:16}} onClick={()=>setShowSummary(false)}>Sluiten</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── MAIN APP ──
function App(){
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);
  const [plants, setPlants] = useState([]);
  const [tab, setTab] = useState('home');
  const [selectedPlant, setSelectedPlant] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [toast, setToast] = useState('');

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(''),3000); };

  useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>{setSession(session);setLoading(false);});
    const {data:{subscription}} = supabase.auth.onAuthStateChange((_,s)=>{setSession(s);setLoading(false);});
    return ()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{ if(session) loadPlants(); },[session]);

  const loadPlants = async () => {
    const {data} = await supabase.from('plants').select('*').order('created_at',{ascending:true});
    if(data) setPlants(data);
  };

  const handleAdd = async (plant) => {
    const t = todayStr();
    const {data,error} = await supabase.from('plants').insert([{user_id:session.user.id,...plant,next_water:t,next_feed:addDays(t,plant.feed_every),log:[],photos:[],windows:[]}]).select();
    if(!error){ setPlants(prev=>[...prev,...data]); setShowAdd(false); setTab('home'); showToast('🌿 Plant toegevoegd!'); }
    else alert('Fout: '+error.message);
  };

  const handleWater = async (plant) => {
    const newNext = addDays(todayStr(),plant.water_every);
    const date = new Date().toLocaleDateString('nl-NL',{day:'numeric',month:'short'});
    const newLog = [{type:'💧',text:'Water gegeven',date},...(plant.log||[])].slice(0,20);
    await supabase.from('plants').update({next_water:newNext,log:newLog}).eq('id',plant.id);
    const updated = {...plant,next_water:newNext,log:newLog};
    setPlants(prev=>prev.map(p=>p.id===plant.id?updated:p));
    if(selectedPlant?.id===plant.id) setSelectedPlant(updated);
    showToast('💧 Water gegeven!');
  };

  const handleFeed = async (plant) => {
    const newNext = addDays(todayStr(),plant.feed_every);
    const date = new Date().toLocaleDateString('nl-NL',{day:'numeric',month:'short'});
    const newLog = [{type:'🌿',text:'Voeding gegeven',date},...(plant.log||[])].slice(0,20);
    await supabase.from('plants').update({next_feed:newNext,log:newLog}).eq('id',plant.id);
    const updated = {...plant,next_feed:newNext,log:newLog};
    setPlants(prev=>prev.map(p=>p.id===plant.id?updated:p));
    if(selectedPlant?.id===plant.id) setSelectedPlant(updated);
    showToast('🌿 Voeding gegeven!');
  };

  const handleRepot = async (plant) => {
    const newNext = addDays(todayStr(), 365);
    const date = new Date().toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'});
    const newLog = [{type:'🪴',text:'Verpot',date},...(plant.log||[])].slice(0,20);
    await supabase.from('plants').update({next_repot:newNext,last_repotted:todayStr(),log:newLog}).eq('id',plant.id);
    const updated = {...plant,next_repot:newNext,last_repotted:todayStr(),log:newLog};
    setPlants(prev=>prev.map(p=>p.id===plant.id?updated:p));
    if(selectedPlant?.id===plant.id) setSelectedPlant(updated);
    showToast('🪴 Verpot geregistreerd!');
  };

  const handleSnooze = async (plant) => {
    const newNext = addDays(plant.next_water,1);
    await supabase.from('plants').update({next_water:newNext}).eq('id',plant.id);
    setPlants(prev=>prev.map(p=>p.id===plant.id?{...p,next_water:newNext}:p));
    showToast('⏰ Uitgesteld tot morgen');
  };

  const handleUndo = async (plant) => {
    await supabase.from('plants').update({next_water:todayStr()}).eq('id',plant.id);
    setPlants(prev=>prev.map(p=>p.id===plant.id?{...p,next_water:todayStr()}:p));
    showToast('↩️ Taak teruggezet');
  };

  const handleDelete = async (id) => {
    await supabase.from('plants').delete().eq('id',id);
    setPlants(prev=>prev.filter(p=>p.id!==id));
    setSelectedPlant(null);
    showToast('🗑 Plant verwijderd');
  };

  const handleDeleteAll = async () => {
    await supabase.from('plants').delete().eq('user_id',session.user.id);
    setPlants([]); showToast('🗑 Alle planten verwijderd');
  };

  const handleUpdate = (updated) => {
    setPlants(prev=>prev.map(p=>p.id===updated.id?updated:p));
    setSelectedPlant(updated);
  };

  const handleLogout = async () => { await supabase.auth.signOut(); setSession(null); setPlants([]); };

  if(loading) return <div className="app"><div className="loading-wrap"><div className="spinner"/><div style={{fontSize:14,color:'var(--ink3)'}}>Laden...</div></div></div>;
  if(!session) return <div className="app"><LoginScreen/></div>;

  const showNav = !selectedPlant && !showAdd;

  return (
    <div className="app">
      <div className="screen-content">
        {selectedPlant && <PlantDetail plant={selectedPlant} onBack={()=>setSelectedPlant(null)} onDelete={handleDelete} onWater={handleWater} onFeed={handleFeed} onRepot={handleRepot} onUpdate={handleUpdate} showToast={showToast} userId={session.user.id}/>}
        {!selectedPlant && showAdd && <AddPlant onBack={()=>setShowAdd(false)} onAdd={handleAdd}/>}
        {!selectedPlant && !showAdd && tab==='home' && <Dashboard plants={plants} onPlantClick={setSelectedPlant} onAdd={()=>setShowAdd(true)}/>}
        {!selectedPlant && !showAdd && tab==='schema' && <SchemaScreen plants={plants}/>}
        {!selectedPlant && !showAdd && tab==='alerts' && <AlertsScreen plants={plants} onWater={handleWater} onFeed={handleFeed} onSnooze={handleSnooze} onUndo={handleUndo}/>}
        {!selectedPlant && !showAdd && tab==='profiel' && <ProfielScreen user={session.user} plants={plants} onLogout={handleLogout} onDeleteAll={handleDeleteAll}/>}
      </div>
      {showNav && (
        <div className="bottom-nav">
          <div className={`nav-item ${tab==='home'?'active':''}`} onClick={()=>setTab('home')}><div className="nav-icon">🏡</div><div className="nav-label">Tuin</div></div>
          <div className={`nav-item ${tab==='schema'?'active':''}`} onClick={()=>setTab('schema')}><div className="nav-icon">📅</div><div className="nav-label">Schema</div></div>
          <div className="nav-add" onClick={()=>setShowAdd(true)}>+</div>
          <div className={`nav-item ${tab==='alerts'?'active':''}`} onClick={()=>setTab('alerts')}><div className="nav-icon">🔔</div><div className="nav-label">Alerts</div></div>
          <div className={`nav-item ${tab==='profiel'?'active':''}`} onClick={()=>setTab('profiel')}><div className="nav-icon">👤</div><div className="nav-label">Profiel</div></div>
        </div>
      )}
      <Toast msg={toast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
